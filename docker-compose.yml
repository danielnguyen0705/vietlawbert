services:
  # ==========================================
  # 1. BỘ NÃO XỬ LÝ & DỮ LIỆU THÔ (CORE)
  # ==========================================
  app:
    build: .
    container_name: vietlawbert_container
    volumes:
      - .:/app  # BIND MOUNT: Sửa code máy thật, Docker cập nhật ngay
    environment:
      # Cấu hình để code Python trong App biết đường tìm đến các DB
      - MONGO_URI=mongodb://db:27017/
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=vietlawbert
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
    depends_on:
      - db
      - neo4j
      - milvus-standalone
    stdin_open: true 
    tty: true
    networks:
      - vietlaw_net

  db:
    image: mongo:latest
    container_name: mongodb_vietlaw
    ports:
      - "27017:27017" # Kết nối MongoDB Compass từ máy thật
    volumes:
      - vietlaw_data:/data/db # VOLUME: Dữ liệu bền vững
    networks:
      - vietlaw_net

  # ==========================================
  # 2. HẠ TẦNG HYBRID RAG (GRAPH & VECTOR)
  # ==========================================
  neo4j:
    image: neo4j:5.18.1  # Phiên bản tối ưu cho LangChain/GraphRAG
    container_name: neo4j_vietlaw
    ports:
      - "7474:7474" # Giao diện Web (mở http://localhost:7474 trên trình duyệt)
      - "7687:7687" # Cổng Bolt giao tiếp với code Python
    environment:
      - NEO4J_AUTH=neo4j/vietlawbert # Tài khoản đăng nhập (User: neo4j / Pass: vietlawbert)
      - NEO4J_PLUGINS=["apoc"] # Cài sẵn thư viện APOC cực kỳ cần thiết cho Graph
    volumes:
      - neo4j_data:/data
    networks:
      - vietlaw_net

  # --- Cụm hệ sinh thái Milvus ---
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: milvus_etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - vietlaw_net

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus_minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001" # Cổng giao diện console của MinIO
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - vietlaw_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    image: milvusdb/milvus:v2.4.5
    container_name: milvus_vietlaw
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530" # Cổng để Python (pymilvus) kết nối vào
      - "9091:9091"
    depends_on:
      - "etcd"
      - "minio"
    networks:
      - vietlaw_net

# Khai báo các Volume chuyên biệt để không bao giờ mất dữ liệu
volumes:
  vietlaw_data:
  neo4j_data:
  etcd_data:
  minio_data:
  milvus_data:

# Tạo mạng LAN ảo cho hệ thống
networks:
  vietlaw_net:
    driver: bridge